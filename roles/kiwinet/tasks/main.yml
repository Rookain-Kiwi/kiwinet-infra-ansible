# ─────────────────────────────────────────────
# roles/kiwinet/tasks/main.yml
# Rôle : kiwinet — Déploiement de l'infrastructure applicative
#
# Responsabilités :
#   1. Création de la structure /opt/kiwinet-*
#   2. Clone des repos GitHub (HTTPS — repos publics)
#   3. Premier démarrage des stacks Docker Compose
#
# Structure kiwinet-observability :
#   /opt/kiwinet-observability/monitoring/  → Prometheus, Grafana, Loki, Promtail, cAdvisor
#   /opt/kiwinet-observability/uptime/      → Uptime Kuma
#
# Prérequis manuels AVANT ce rôle (non automatisables) :
#   - Fichiers .env dans chaque répertoire de service
#   - acme.json présent et chmod 600 dans traefik/
#   - application.yml Komf dans komf/config/ (contient credentials — non versionné)
#   - metadata.db Calibre initialisé dans calibre/config/ (voir README calibre)
# ─────────────────────────────────────────────

# ── Reset connexion SSH ───────────────────────
# Nécessaire pour que l'appartenance au groupe docker (ajoutée par le rôle docker)
# soit prise en compte sans déconnexion manuelle.

- name: "Reset de la connexion SSH pour appliquer le groupe docker"
  meta: reset_connection

# ── Répertoires /opt ──────────────────────────

- name: "Création des répertoires de base /opt/kiwinet-*"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: rookain
    group: rookain
    mode: "0755"
  loop:
    - /opt/kiwinet-services
    - /opt/kiwinet-web
    - /opt/kiwinet-observability

# ── Clone des repos ───────────────────────────

- name: "Clone du repo kiwinet-services (Traefik, Plex, Minecraft, HA, Komga, Komf, Calibre-Web)"
  ansible.builtin.git:
    repo: https://github.com/Rookain-Kiwi/kiwinet-services.git
    dest: /opt/kiwinet-services
    version: main
    update: false
  become_user: rookain

# ── Komf — prérequis ─────────────────────────

- name: "Création du répertoire de config Komf"
  ansible.builtin.file:
    path: /opt/kiwinet-services/komf/config
    state: directory
    owner: rookain
    group: rookain
    mode: "0755"

- name: "Création du fichier .env vide Komf (requis par docker compose)"
  ansible.builtin.copy:
    content: ""
    dest: /opt/kiwinet-services/komf/.env
    owner: rookain
    group: rookain
    mode: "0644"
    force: false

- name: "Vérification de la présence du fichier application.yml Komf"
  ansible.builtin.stat:
    path: /opt/kiwinet-services/komf/config/application.yml
  register: komf_config

- name: "Avertissement si application.yml Komf absent"
  ansible.builtin.debug:
    msg: >
      ATTENTION : /opt/kiwinet-services/komf/config/application.yml est absent.
      Déployer manuellement ce fichier (credentials Komga + clé ComicVine) avant de lancer la stack Komf.
      Template disponible dans komf/config/application.yml.template
  when: not komf_config.stat.exists

# ── BedethequeKomga ───────────────────────────

- name: "Clone de BedethequeKomga"
  ansible.builtin.git:
    repo: https://github.com/Inervo/BedethequeKomga.git
    dest: /opt/kiwinet-services/bedetheque-komga
    version: main
    update: false
  become_user: rookain

- name: "Installation des dépendances Python BedethequeKomga"
  ansible.builtin.pip:
    requirements: /opt/kiwinet-services/bedetheque-komga/requirements.txt
    extra_args: "--break-system-packages"

- name: "Clone du repo kiwinet-observability (Prometheus, Grafana, Uptime Kuma)"
  ansible.builtin.git:
    repo: https://github.com/Rookain-Kiwi/kiwinet-observability.git
    dest: /opt/kiwinet-observability
    version: main
    update: false
  become_user: rookain

# ── Calibre-Web — prérequis ──────────────────

- name: "Création du répertoire de config Calibre-Web"
  ansible.builtin.file:
    path: /opt/kiwinet-services/calibre/config
    state: directory
    owner: rookain
    group: rookain
    mode: "0755"

- name: "Vérification de la présence du metadata.db Calibre"
  ansible.builtin.stat:
    path: /opt/kiwinet-services/calibre/config/metadata.db
  register: calibre_db

- name: "Avertissement si metadata.db Calibre absent"
  ansible.builtin.debug:
    msg: >
      ATTENTION : /opt/kiwinet-services/calibre/config/metadata.db est absent.
      Initialiser la base avant de lancer la stack Calibre-Web :
        calibredb add --empty --library-path /tmp/calibre-init
        cp /tmp/calibre-init/metadata.db /opt/kiwinet-services/calibre/config/metadata.db
        chown 1000:1000 /opt/kiwinet-services/calibre/config/metadata.db
      Voir calibre/README.md pour le détail complet.
  when: not calibre_db.stat.exists

# ── Vérification secrets ──────────────────────

- name: "Vérification de la présence du fichier .env Traefik"
  ansible.builtin.stat:
    path: /opt/kiwinet-services/traefik/.env
  register: traefik_env

- name: "Avertissement si .env Traefik absent"
  ansible.builtin.debug:
    msg: >
      ATTENTION : /opt/kiwinet-services/traefik/.env est absent.
      Déployer manuellement les fichiers de secrets avant de lancer les stacks.
  when: not traefik_env.stat.exists

# ── Démarrage des stacks ─────────────────────

- name: "Démarrage de la stack Traefik"
  community.docker.docker_compose_v2:
    project_src: /opt/kiwinet-services/traefik
    state: present
  become_user: rookain
  when: traefik_env.stat.exists

- name: "Démarrage de la stack monitoring"
  community.docker.docker_compose_v2:
    project_src: /opt/kiwinet-observability/monitoring
    state: present
  become_user: rookain
  ignore_errors: true

- name: "Démarrage de la stack Uptime Kuma"
  community.docker.docker_compose_v2:
    project_src: /opt/kiwinet-observability/uptime
    state: present
  become_user: rookain
  ignore_errors: true

- name: "Démarrage de la stack Komga"
  community.docker.docker_compose_v2:
    project_src: /opt/kiwinet-services/komga
    state: present
  become_user: rookain
  ignore_errors: true

- name: "Démarrage de la stack Komf"
  community.docker.docker_compose_v2:
    project_src: /opt/kiwinet-services/komf
    state: present
  become_user: rookain
  when: komf_config.stat.exists
  ignore_errors: true

- name: "Démarrage de la stack Calibre-Web"
  community.docker.docker_compose_v2:
    project_src: /opt/kiwinet-services/calibre
    state: present
  become_user: rookain
  when: calibre_db.stat.exists
  ignore_errors: true
