# ─────────────────────────────────────────────
# inventory.ini — Inventaire des hôtes Ansible
# Projet : kiwinet-infra-vm
#
# On utilise le DNS plutôt que l'IP directe :
# kiwinet.me est public par définition (portfolio), et le pivot IP
# reste transparent via Bluehost si l'adresse venait à changer.
# ─────────────────────────────────────────────

[kiwinet]
kiwinet-vm ansible_host=kiwinet.me ansible_port=22

[kiwinet:vars]
# Interpréteur Python explicite — évite les warnings de détection automatique
ansible_python_interpreter=/usr/bin/python3
