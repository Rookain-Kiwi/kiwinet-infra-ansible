# ─────────────────────────────────────────────
# inventory.ini — Inventaire des hôtes Ansible
# Projet : kiwinet-infra-ansible
#
# Deux groupes cibles :
#   [freebox] — VM résidentielle Debian ARM64 (Freebox Delta)
#   [cloud]   — VPS Scaleway x86_64 (fr-par-1)
# ─────────────────────────────────────────────

[freebox]
kiwinet-vm ansible_host=kiwinet.me ansible_port=22

[cloud]
kiwinet-cloud ansible_host=163.172.134.30 ansible_port=2222 ansible_user=rookain ansible_ssh_private_key_file=~/.ssh/kiwinet_deploy

[freebox:vars]
ansible_python_interpreter=/usr/bin/python3

[cloud:vars]
ansible_python_interpreter=/usr/bin/python3