# playbook-freebox.yml
# Playbook Freebox Delta — provisioning complet VM ARM64 depuis zéro
# Cible : groupe [freebox] (inventory.ini)
# Ordre d'exécution : base → ssh → ufw → docker → storage → kiwinet
# Prérequis : accès SSH avec clé kiwinet, sudo sans mot de passe

- name: Provisioning VM Kiwinet (Freebox Delta)
  hosts: freebox
  gather_facts: true

  pre_tasks:
    - name: Vérification architecture ARM64
      ansible.builtin.fail:
        msg: "Ce playbook cible uniquement une VM ARM64 (AArch64). Architecture détectée : {{ ansible_architecture }}"
      when: ansible_architecture != "aarch64"

  roles:
    - base
    - ssh
    - ufw
    - docker
    - storage
    - kiwinet